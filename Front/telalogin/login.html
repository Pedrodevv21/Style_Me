<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>StyleMe - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="wrapper-page">
        
        <div class="coluna-decoracao esq">
            <div class="img-decoracao animar-fluxo"><img src="../img/moda8i.png" alt="Moda"></div>
            <div class="img-decoracao animar-fluxo"><img src="../img/moda7i.png" alt="Estilo"></div>
            <div class="img-decoracao animar-fluxo"><img src="../img/moda11.jfif" alt="Tendência"></div>
        </div>

        <div class="container">
            <div class="form-header-with-logo">
                <img src="../img/Logo.png" alt="Logotipo StyleMe" class="logo-empresa">
                <h2 class="title-main">Crie seu estilo</h2>
                <p class="title-sub">Acesse sua conta</p>
            </div>
            
            <form id="formLogin">
                <input type="email" id="login_email" placeholder="E-mail" required>
                <input type="password" id="login_senha" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>

            <div class="link-login">
                <p>Ainda não tem conta? <a href="../Loja-virtual--main/Cadastro.html">Cadastre-se aqui</a></p>
            </div>

            <p id="mensagem_login"></p>
        </div>

        <div class="coluna-decoracao dir">
            <div class="img-decoracao animar-fluxo-inverso"><img src="../img/moda9.jfif" alt="Moda"></div>
            <div class="img-decoracao animar-fluxo-inverso"><img src="../img/moda12i.png" alt="Estilo"></div>
            <div class="img-decoracao animar-fluxo-inverso"><img src="../img/moda10.jfif" alt="Tendência"></div>
        </div>

    </div>

    <script src="login.js"></script>
</body>
</html>
